# PostgreSQL. Versions 10 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   brew install postgresql@14
#
# A single PostgreSQL database is shared by Active Record AND the Solid trifecta
# (Solid Queue, Solid Cache, Solid Cable). No separate cache/cable databases.

default: &default
  adapter: postgresql
  encoding: unicode
  # macOS 26+ crashes the forked Solid Queue child if libpq probes GSSAPI on
  # connect (multi-threaded fork unsafe via Kerberos/XPC). Disable explicitly.
  gssencmode: disable
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "password" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

<%
  # ---------------------------------------------------------------------------
  # Per-app, per-worktree database naming
  # ---------------------------------------------------------------------------
  # Database names are derived automatically so that an app forked from this
  # template gets its OWN databases with no edits to this file:
  #
  #   app_name        - the main repository's folder name, sanitized to a legal
  #                     Postgres identifier ("coolapp"; "build-new" -> "build_new").
  #                     Inside a git worktree the ".git" pointer is read to find
  #                     the main repo root, so app_name is always the SAME repo
  #                     name regardless of what the worktree folder is called.
  #
  #   worktree_suffix - "" in the main checkout; "_<workspace>" inside an
  #                     orchestrator worktree, so parallel workspaces get fully
  #                     isolated development AND test databases. The workspace
  #                     name comes from (in priority order):
  #                       1. APP_WORKSPACE_NAME env var — set by
  #                          bin/orchestrator/setup, which bridges the
  #                          orchestrator-specific env var into this single
  #                          project-level name
  #                       2. tmp/WORKSPACE_NAME file — persisted once by
  #                          bin/orchestrator/setup, stable across folder renames
  #                     This file does NOT know about individual orchestrators.
  #                     If neither source is present, worktree_suffix is empty
  #                     (main checkout behavior).
  #
  #   main checkout of "coolapp"       -> coolapp_development         / coolapp_test
  #   workspace "newyork" of "coolapp" -> coolapp_development_newyork / coolapp_test_newyork
  #
  # Override the development name entirely with DATABASE_NAME. Staging/production
  # are named the same way but are overridden by DATABASE_URL on real deploys, so
  # the derived name there is only a local fallback.
  # ---------------------------------------------------------------------------
  app_root = Dir.pwd
  sanitize = ->(value) { value.to_s.gsub(/[^a-z0-9_]/i, "_").downcase }
  git_path = File.join(app_root, ".git")

  if File.file?(git_path)
    raw_gitdir      = File.read(git_path)[/gitdir:\s*(.+)/, 1].to_s.strip
    gitdir          = File.expand_path(raw_gitdir, app_root)
    main_repo_root  = File.expand_path("../../..", gitdir) # <repo>/.git/worktrees/<wt> -> <repo>
    app_name        = sanitize.call(File.basename(main_repo_root))
  else
    app_name        = sanitize.call(File.basename(app_root))
  end
  app_name = "app" if app_name.empty?

  workspace_name_file = File.join(app_root, "tmp", "WORKSPACE_NAME")
  workspace = ENV["APP_WORKSPACE_NAME"]
  workspace = File.read(workspace_name_file).strip if workspace.to_s.empty? && File.file?(workspace_name_file)
  workspace       = nil if workspace.to_s.empty?
  worktree_suffix = workspace ? "_#{sanitize.call(workspace)}" : ""
%>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "#{app_name}_development#{worktree_suffix}" } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= "#{app_name}_test#{worktree_suffix}" %>

# Solid Queue, Solid Cache, and Solid Cable all share this single primary database.
# In production, set DATABASE_URL or override the connection settings via env vars.
staging:
  <<: *default
  database: <%= "#{app_name}_staging" %>
  url: <%= ENV["DATABASE_URL"] %>

production:
  <<: *default
  database: <%= "#{app_name}_production" %>
  url: <%= ENV["DATABASE_URL"] %>
