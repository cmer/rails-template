# PostgreSQL. Versions 10 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   brew install postgresql@14
#
# A single PostgreSQL database is shared by Active Record AND the Solid trifecta
# (Solid Queue, Solid Cache, Solid Cable). No separate cache/cable databases.

default: &default
  adapter: postgresql
  encoding: unicode
  # macOS 26+ crashes the forked Solid Queue child if libpq probes GSSAPI on
  # connect (multi-threaded fork unsafe via Kerberos/XPC). Disable explicitly.
  gssencmode: disable
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USER") { ENV["USER"] } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

<%
  # Per-worktree dev DB isolation. The main checkout (.git is a directory)
  # keeps using build_new_development; each git worktree (.git is a pointer
  # file written by `git worktree add`) gets its own DB suffixed with the
  # worktree directory name, so parallel Conductor worktrees never share or
  # clobber each other's schemas. Override with DATABASE_NAME to force a name.
  app_root = Dir.pwd
  worktree_db_suffix =
    if File.file?(File.join(app_root, ".git"))
      "_#{File.basename(app_root).gsub(/[^a-z0-9_]/i, "_").downcase}"
    else
      ""
    end
%>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "build_new_development#{worktree_db_suffix}" } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: build_new_test

# Solid Queue, Solid Cache, and Solid Cable all share this single primary database.
# In production, set DATABASE_URL or override the connection settings via env vars.
staging:
  <<: *default
  database: build_new_staging
  url: <%= ENV["DATABASE_URL"] %>

production:
  <<: *default
  database: build_new_production
  url: <%= ENV["DATABASE_URL"] %>
